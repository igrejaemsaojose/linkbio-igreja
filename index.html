<!DOCTYPE html>
<!--
  ============================================================
  index.html — bio-igreja
  ============================================================
  FUNÇÃO DESTE ARQUIVO:
  Página única (single page) da bio da Igreja em São José.
  Funciona como um "link in bio" — centraliza em um só lugar
  os principais canais: WhatsApp, YouTube e App Pão de Judah.

  ESTRUTURA DA PÁGINA (de cima para baixo):
  1. <head>  — metadados, SEO, fontes, estilos
  2. <body>
     ├── Blobs decorativos (fundos desfocados)
     ├── .page-wrapper
     │   ├── .profile-card (avatar + nome + bio + tags)
     │   ├── .links-section (lista de 3 botões de link)
     │   └── <footer>
     └── Scripts JS

  TECNOLOGIA:
  HTML5 semântico + CSS3 puro + JavaScript Vanilla.
  Sem frameworks, sem build step. Deploy direto no Vercel.
  Página somente em português — sem sistema de i18n.
  ============================================================
-->
<html lang="pt">
<head>
  <!-- Codificação de caracteres UTF-8: garante que acentos,
       cedilhas e outros caracteres especiais sejam exibidos
       corretamente em todos os navegadores. -->
  <meta charset="UTF-8" />

  <!-- Viewport responsivo: instrui o navegador mobile a usar
       a largura real do dispositivo (width=device-width) e
       a não aplicar zoom automático (initial-scale=1.0).
       Sem isso, sites aparecem miniaturizados em celulares. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Meta description: texto exibido nos resultados do Google
       e em cards de compartilhamento nas redes sociais. -->
  <!-- TODO: substituir pelo texto real da igreja -->
  <meta name="description" content="Igreja em São José — nossos canais de contato e acesso." />

  <!-- Título da aba do navegador. -->
  <title>Igreja em São José</title>

  <!-- ── Open Graph ──────────────────────────────────────────
       Metadados para compartilhamento em redes sociais
       (Facebook, Instagram, WhatsApp, Telegram, etc.).
  -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Igreja em São José" />
  <!-- TODO: substituir pelo texto real da igreja -->
  <meta property="og:description" content="Igreja em São José — nossos canais de contato e acesso." />

  <!-- ── Favicon (ícone da aba) ──────────────────────────────
       Múltiplos formatos para compatibilidade máxima.
       TODO: substituir pelos favicons da marca da igreja.
  -->
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
  <link rel="icon" type="image/x-icon"  href="public/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png" />
  <link rel="apple-touch-icon"    href="public/apple-touch-icon.png" />
  <link rel="manifest"            href="public/site.webmanifest" />

  <!-- ── Tipografia (Google Fonts) ───────────────────────────
       TODO: confirmar fonte após definição do design system.
       Fonte atual (herdada): Sora.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- ── Estilos CSS ─────────────────────────────────────────
       Carregados na ordem correta:
       1. reset.css:  zera os estilos padrão do navegador
       2. tokens.css: define as variáveis CSS da marca
       3. styles.css: estilos da aplicação (usa as variáveis acima)
       TODO: atualizar tokens.css com as cores da marca da igreja.
  -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── BLOBS DECORATIVOS ────────────────────────────────────
       Dois elementos circulares posicionados no fundo da página
       com posição fixed. São fortemente desfocados e criam um
       efeito visual de "iluminação suave".
       aria-hidden="true" diz aos leitores de tela que estes
       elementos são puramente decorativos.
  -->
  <div class="blob blob--top-left" aria-hidden="true"></div>
  <div class="blob blob--bottom-right" aria-hidden="true"></div>

  <!-- ── PAGE WRAPPER ─────────────────────────────────────────
       Contêiner central que limita a largura máxima (28rem)
       e centraliza horizontalmente — pensado para mobile.
  -->
  <div class="page-wrapper">

    <!-- ── CARD DE PERFIL ──────────────────────────────────────
         Seção semântica com a identidade visual da igreja:
         avatar, nome, bio e tags.
    -->
    <section class="profile-card" aria-label="Perfil">

      <!-- Blob interno decorativo no topo do card. -->
      <div class="profile-card__blob" aria-hidden="true"></div>

      <!-- ── AVATAR ─────────────────────────────────────────────
           TODO: substituir avatar.png pelo logo/foto da igreja.
           width/height declarados evitam Cumulative Layout Shift.
      -->
      <div class="avatar-wrap">
        <img
          src="assets/images/avatar.png"
          alt="Igreja em São José"
          class="avatar"
          width="128"
          height="128"
          loading="eager"
          fetchpriority="high"
          decoding="sync"
        />
      </div>

      <!-- Nome — h1 é o título mais importante da página.
           Deve existir apenas um h1 por página. -->
      <h1 class="profile-name">Igreja em São José</h1>

      <!-- Bio — parágrafo descritivo.
           TODO: substituir pelo texto real da igreja. -->
      <p class="profile-bio">
        Bem-vindo! Acesse nossos canais e fique por dentro de tudo.
      </p>

      <!-- Tags da igreja.
           TODO: atualizar com as tags reais da identidade da igreja. -->
      <div class="profile-tags" aria-label="Tags">
        <span class="profile-tag">Fé</span>
        <span class="profile-tag">Comunidade</span>
        <span class="profile-tag">Evangelismo</span>
      </div>
    </section>

    <!-- ── SEÇÃO DE LINKS ───────────────────────────────────────
         Lista de 4 botões de link para os principais canais.
    -->
    <section class="links-section" aria-label="Links">

      <p class="links-eyebrow">Acessos Rápidos</p>
      <h2 class="links-title">Nossos Links</h2>

      <ul class="links-list">

        <!-- ── WHATSAPP ──────────────────────────────────────────
             Abre o WhatsApp com mensagem pré-preenchida de contato.
        -->
        <li>
          <a
            href="https://api.whatsapp.com/send/?phone=5548999995841&text=Ol%C3%A1%21+Estava+nas+redes+sociais+da+%2AIgreja+do+Senhor+Jesus+Cristo+em+S%C3%A3o+Jos%C3%A9%2A+e+gostaria+de+uma+ajuda+%F0%9F%99%8F&type=phone_number&app_absent=0"
            id="link-whatsapp"
            class="link-btn"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Fale conosco pelo WhatsApp"
          >
            <!-- Ícone: logo oficial do WhatsApp -->
            <span class="link-btn__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
              </svg>
            </span>
            <span class="link-btn__label">Fale Conosco</span>
            <span class="link-btn__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </span>
          </a>
        </li>

        <!-- ── YOUTUBE ───────────────────────────────────────────
             Canal oficial da Igreja em São José no YouTube.
        -->
        <li>
          <a
            href="https://www.youtube.com/@igrejaemsaojose"
            id="link-youtube"
            class="link-btn"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Acesse nosso canal no YouTube"
          >
            <!-- Ícone: logo oficial do YouTube -->
            <span class="link-btn__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
              </svg>
            </span>
            <span class="link-btn__label">Canal no YouTube</span>
            <span class="link-btn__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </span>
          </a>
        </li>

        <!-- ── APP ANDROID (PÃO DE JUDAH) ───────────────────────
             Link para o app Pão de Judah na Google Play Store.
        -->
        <li>
          <a
            href="https://play.google.com/store/apps/details?id=br.com.paodejuda.app"
            id="link-app-android"
            class="link-btn"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Baixe o aplicativo Pão de Judah para Android"
          >
            <!-- Ícone: logo oficial do Android -->
            <span class="link-btn__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M17.523 15.3414c-.5511 0-.9993-.4486-.9993-.9997s.4483-.9993.9993-.9993c.5511 0 .9993.4483.9993.9993.0001.5511-.4482.9997-.9993.9997m-11.046 0c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4483.9993.9993 0 .5511-.4483.9997-.9993.9997m11.4045-6.02l1.9973-3.4592a.416.416 0 0 0-.1518-.5676.416.416 0 0 0-.5676.1518l-2.0223 3.503C15.5902 8.2439 13.8533 7.8508 12 7.8508s-3.5902.3931-5.1367 1.0729L4.841 5.4207a.4161.4161 0 0 0-.5677-.1518.4157.4157 0 0 0-.1517.5676l1.9973 3.4592C3.9631 10.1417 2.1 12.5297 2.1 15.37H21.9c0-2.8403-1.8631-5.2283-4.0185-6.0486"/>
              </svg>
            </span>
            <span class="link-btn__label">App Android — Pão de Judah</span>
            <span class="link-btn__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </span>
          </a>
        </li>

        <!-- ── APP IOS (PÃO DE JUDAH) ────────────────────────────
             Link para o app Pão de Judah na Apple App Store.
             App Store ID: 1229503159
        -->
        <li>
          <a
            href="https://apps.apple.com/br/app/p%C3%A3o-de-jud%C3%A1/id1229503159"
            id="link-app-ios"
            class="link-btn"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Baixe o aplicativo Pão de Judah para iPhone"
          >
            <!-- Ícone: logo oficial da Apple -->
            <span class="link-btn__icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/>
              </svg>
            </span>
            <span class="link-btn__label">App iOS — Pão de Judah</span>
            <span class="link-btn__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <line x1="7" y1="17" x2="17" y2="7"/>
                <polyline points="7 7 17 7 17 17"/>
              </svg>
            </span>
          </a>
        </li>

      </ul>
    </section><!-- /.links-section -->

    <!-- ── FOOTER ────────────────────────────────────────────────
         TODO: confirmar texto e ano do copyright.
    -->
    <footer class="site-footer">
      <p>© 2026 Igreja em São José. Todos os direitos reservados.</p>
    </footer>

  </div><!-- /.page-wrapper -->

  <!-- ── SCRIPTS JS ────────────────────────────────────────────
       Carregado no FIM do <body>, depois que todo o HTML
       já foi interpretado pelo navegador.
  -->
  <script src="js/main.js"></script>

</body>
</html>
