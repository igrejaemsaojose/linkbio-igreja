<!DOCTYPE html>
<!--
  ============================================================
  index.html — bio-igreja
  ============================================================
  Página única da bio da Igreja em São José.
  "Link in bio" com avatar flutuante, nome e 4 botões de link.

  ESTRUTURA (de cima para baixo):
  1. <head>  — metadados, SEO, fontes, estilos
  2. <body>
     ├── Blobs decorativos de fundo
     ├── .page-wrapper
     │   ├── .profile-section (avatar flutuante + nome)
     │   ├── .links-list (4 botões de link)
     │   └── <footer>
     └── Scripts JS

  TECNOLOGIA:
  HTML5 semântico + CSS3 puro + JavaScript Vanilla.
  Sem frameworks, sem build step. Deploy direto no Vercel.
  Página somente em português — sem sistema de i18n.
  ============================================================
-->
<html lang="pt-BR">
<head>
  <!-- Codificação de caracteres UTF-8: garante que acentos,
       cedilhas e outros caracteres especiais sejam exibidos
       corretamente em todos os navegadores. -->
  <meta charset="UTF-8" />

  <!-- Viewport responsivo: instrui o navegador mobile a usar
       a largura real do dispositivo (width=device-width) e
       a não aplicar zoom automático (initial-scale=1.0).
       Sem isso, sites aparecem miniaturizados em celulares. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Meta description: texto exibido nos resultados do Google
       e em cards de compartilhamento nas redes sociais. -->
  <meta name="description" content="Igreja em São José — nossos canais de contato e acesso." />

  <!-- Título da aba do navegador. -->
  <title>Igreja em São José</title>

  <!-- ── Open Graph ──────────────────────────────────────────
       Metadados para compartilhamento em redes sociais
       (Facebook, Instagram, WhatsApp, Telegram, etc.).
  -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Igreja em São José" />
  <meta property="og:description" content="Igreja em São José — nossos canais de contato e acesso." />

  <!-- ── Favicon (ícone da aba) ──────────────────────────────
       Símbolo da marca da Igreja em São José (estrela/sol).
       apple-touch-icon: ícone quando salvo na tela inicial do iOS.
  -->
  <link rel="icon"             type="image/png" href="public/favicon.png" />
  <link rel="apple-touch-icon"                  href="public/apple-touch-icon.png" />
  <link rel="manifest"                          href="public/site.webmanifest" />

  <!-- ── Tipografia (Google Fonts) ───────────────────────────
       Fonte: Sora — pesos 300 a 800.
       preconnect aquece a conexão com os servidores do Google
       antes do download da fonte, reduzindo a latência.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400;1,700&family=Rubik:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ── Estilos CSS ─────────────────────────────────────────
       Carregados na ordem correta:
       1. reset.css:  zera os estilos padrão do navegador
       2. tokens.css: define as variáveis CSS da marca
       3. styles.css: estilos da aplicação (usa as variáveis acima)
  -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── BLOBS DECORATIVOS ────────────────────────────────────
       Dois elementos circulares posicionados no fundo da página
       com posição fixed. São fortemente desfocados e criam um
       efeito visual de "iluminação suave" em azul céu.
       aria-hidden="true" diz aos leitores de tela que estes
       elementos são puramente decorativos.
  -->
  <div class="blob blob--top-left"     aria-hidden="true"></div>
  <div class="blob blob--bottom-right" aria-hidden="true"></div>

  <!-- ── PAGE WRAPPER ─────────────────────────────────────────
       Contêiner central que limita a largura máxima (28rem)
       e centraliza horizontalmente — pensado para mobile.
  -->
  <div class="page-wrapper">

    <!-- ── SEÇÃO DE PERFIL ───────────────────────────────────
         Avatar flutuante + nome da igreja.
         Sem bio ou tags — layout minimalista.
    -->
    <section class="profile-section" aria-label="Perfil">

      <!-- Avatar com efeito de flutuação.
           width/height declarados evitam Cumulative Layout Shift. -->
      <div class="avatar-wrap">
        <img
          src="assets/images/avatar.png"
          alt="Igreja em São José"
          class="avatar"
          width="128"
          height="128"
          loading="eager"
          fetchpriority="high"
          decoding="sync"
        />
      </div>

      <!-- Nome — h1 é o título mais importante da página.
           Deve existir apenas um h1 por página. -->
      <h1 class="profile-name">Igreja em São José</h1>

    </section>

    <!-- ── LISTA DE LINKS ────────────────────────────────────
         4 botões de acesso rápido aos canais da igreja:
         WhatsApp, YouTube, App Android e App iOS.
    -->
    <ul class="links-list" aria-label="Links">

      <!-- ── YOUTUBE ───────────────────────────────────────────
           Canal oficial da Igreja em São José no YouTube.
      -->
      <li>
        <a
          href="https://www.youtube.com/@igrejaemsaojose"
          id="link-youtube"
          class="link-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Acesse nosso canal no YouTube"
        >
          <span class="link-btn__icon-wrap link-btn__icon-wrap--image" aria-hidden="true">
            <img src="assets/images/logo-youtube.png" alt="" width="40" height="40" />
          </span>
          <span class="link-btn__label">Nosso canal no YouTube</span>
          <span class="link-btn__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- ── WHATSAPP ──────────────────────────────────────────
           Abre o WhatsApp com mensagem pré-preenchida de contato.
      -->
      <li>
        <a
          href="https://api.whatsapp.com/send/?phone=5548999995841&text=Ol%C3%A1%21+Estava+nas+redes+sociais+da+%2AIgreja+do+Senhor+Jesus+Cristo+em+S%C3%A3o+Jos%C3%A9%2A+e+gostaria+de+uma+ajuda+%F0%9F%99%8F&type=phone_number&app_absent=0"
          id="link-whatsapp"
          class="link-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Fale conosco pelo WhatsApp"
        >
          <span class="link-btn__icon-wrap link-btn__icon-wrap--image" aria-hidden="true">
            <img src="assets/images/logo-whatsapp.avif" alt="" width="40" height="40" />
          </span>
          <span class="link-btn__label">Quer oração? Fale conosco</span>
          <span class="link-btn__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- ── APP IOS (PÃO DE JUDÁ) ─────────────────────────────
           Link para o app Pão de Judá na Apple App Store.
           App Store ID: 1229503159
      -->
      <li>
        <a
          href="https://apps.apple.com/br/app/p%C3%A3o-de-jud%C3%A1/id1229503159"
          id="link-app-ios"
          class="link-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Baixe o aplicativo Pão de Judá para iPhone"
        >
          <span class="link-btn__icon-wrap link-btn__icon-wrap--image" aria-hidden="true">
            <img src="assets/images/logo-pao-de-juda.webp" alt="" width="40" height="40" />
          </span>
          <span class="link-btn__label">App Pão de Judá - iOS</span>
          <span class="link-btn__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </a>
      </li>

      <!-- ── APP ANDROID (PÃO DE JUDÁ) ────────────────────────
           Link para o app Pão de Judá na Google Play Store.
      -->
      <li>
        <a
          href="https://play.google.com/store/apps/details?id=br.com.paodejuda.app"
          id="link-app-android"
          class="link-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Baixe o aplicativo Pão de Judá para Android"
        >
          <span class="link-btn__icon-wrap link-btn__icon-wrap--image" aria-hidden="true">
            <img src="assets/images/logo-pao-de-juda.webp" alt="" width="40" height="40" />
          </span>
          <span class="link-btn__label">App Pão de Judá - Android</span>
          <span class="link-btn__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <line x1="7" y1="17" x2="17" y2="7"/>
              <polyline points="7 7 17 7 17 17"/>
            </svg>
          </span>
        </a>
      </li>

    </ul>

    <!-- ── FOOTER ──────────────────────────────────────────────
         Rodapé com copyright da igreja.
    -->
    <footer class="site-footer">
      <p>© 2026 Igreja em São José. Todos os direitos reservados.</p>
    </footer>

  </div><!-- /.page-wrapper -->

  <!-- ── SCRIPTS JS ────────────────────────────────────────────
       Carregado no FIM do <body>, depois que todo o HTML
       já foi interpretado pelo navegador.
  -->
  <script src="js/main.js"></script>

</body>
</html>
